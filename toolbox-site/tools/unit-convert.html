<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单位换算 - 在线单位转换工具 | ToolBox</title>
<meta name="description" content="免费在线单位换算工具，支持长度、重量、温度、面积、体积、速度等单位转换。">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="header"><div class="container"><a href="../index.html" class="logo">🧰 ToolBox</a><nav class="nav"><a href="../index.html">返回首页</a></nav></div></header>
<main class="tool-page"><div class="container">
<div class="breadcrumb"><a href="../index.html">首页</a> / 生活工具 / 单位换算</div>
<h1>📏 单位换算</h1>
<p class="subtitle">长度、重量、温度、面积、体积、速度单位在线转换</p>
<div class="tool-area">
<h3>📐 选择类型</h3>
<div class="option-group" id="typeGroup">
<div class="option-item active" data-type="length" onclick="selectType(this)">📏 长度</div>
<div class="option-item" data-type="weight" onclick="selectType(this)">⚖️ 重量</div>
<div class="option-item" data-type="temperature" onclick="selectType(this)">🌡️ 温度</div>
<div class="option-item" data-type="area" onclick="selectType(this)">📐 面积</div>
<div class="option-item" data-type="volume" onclick="selectType(this)">🧊 体积</div>
<div class="option-item" data-type="speed" onclick="selectType(this)">🚀 速度</div>
<div class="option-item" data-type="data" onclick="selectType(this)">💾 数据</div>
<div class="option-item" data-type="time" onclick="selectType(this)">⏰ 时间</div>
</div>
<div class="grid-2" style="margin-top:20px">
<div><label>从</label><select id="fromUnit" onchange="convert()"></select><input type="number" id="fromValue" value="1" oninput="convert()" style="margin-top:8px"></div>
<div><label>到</label><select id="toUnit" onchange="convert()"></select><input type="number" id="toValue" readonly style="margin-top:8px;background:#f8fafc;font-weight:bold;color:var(--primary)"></div>
</div>
<div class="btn-group" style="justify-content:center"><button class="btn btn-primary" onclick="swapUnits()">🔄 交换</button><button class="btn btn-secondary" onclick="copyToClipboard(document.getElementById('toValue').value)">📋 复制</button></div>
</div>
</div></main>
<footer class="footer"><div class="container">© 2026 ToolBox</div></footer>
<script src="../js/main.js"></script>
<script>
const units={length:{name:'长度',units:{mm:{name:'毫米',f:0.001},cm:{name:'厘米',f:0.01},m:{name:'米',f:1},km:{name:'千米',f:1000},in:{name:'英寸',f:0.0254},ft:{name:'英尺',f:0.3048},mi:{name:'英里',f:1609.344},li:{name:'里',f:500}}},weight:{name:'重量',units:{mg:{name:'毫克',f:0.000001},g:{name:'克',f:0.001},kg:{name:'千克',f:1},t:{name:'吨',f:1000},oz:{name:'盎司',f:0.0283495},lb:{name:'磅',f:0.453592},jin:{name:'斤',f:0.5}}},temperature:{name:'温度',units:{c:{name:'摄氏度'},f:{name:'华氏度'},k:{name:'开尔文'}},custom:true},area:{name:'面积',units:{mm2:{name:'平方毫米',f:0.000001},cm2:{name:'平方厘米',f:0.0001},m2:{name:'平方米',f:1},km2:{name:'平方千米',f:1000000},ha:{name:'公顷',f:10000},mu:{name:'亩',f:666.667}}},volume:{name:'体积',units:{ml:{name:'毫升',f:0.000001},l:{name:'升',f:0.001},m3:{name:'立方米',f:1},gal:{name:'加仑',f:0.003785}}},speed:{name:'速度',units:{ms:{name:'米/秒',f:1},kmh:{name:'千米/时',f:0.277778},mph:{name:'英里/时',f:0.44704},kn:{name:'节',f:0.514444}}},data:{name:'数据',units:{b:{name:'比特',f:1},B:{name:'字节',f:8},KB:{name:'KB',f:8192},MB:{name:'MB',f:8388608},GB:{name:'GB',f:8589934592}}},time:{name:'时间',units:{ms:{name:'毫秒',f:0.001},s:{name:'秒',f:1},min:{name:'分钟',f:60},h:{name:'小时',f:3600},d:{name:'天',f:86400},w:{name:'周',f:604800}}}};
let currentType='length';
function selectType(el){document.querySelector('.option-item.active').classList.remove('active');el.classList.add('active');currentType=el.dataset.type;populateUnits();convert()}
function populateUnits(){const t=units[currentType],f=document.getElementById('fromUnit'),to=document.getElementById('toUnit'),e=Object.entries(t.units);f.innerHTML=e.map(([k,v])=>'<option value="'+k+'">'+v.name+'</option>').join('');to.innerHTML=f.innerHTML;if(e.length>1)to.selectedIndex=1}
function convert(){const t=units[currentType],f=document.getElementById('fromUnit').value,to=document.getElementById('toUnit').value,v=parseFloat(document.getElementById('fromValue').value);if(isNaN(v)){document.getElementById('toValue').value='';return}let r;if(currentType==='temperature'){let c;if(f==='c')c=v;else if(f==='f')c=(v-32)*5/9;else c=v-273.15;if(to==='c')r=c;else if(to==='f')r=c*9/5+32;else r=c+273.15}else{r=v*t.units[f].f/t.units[to].f}document.getElementById('toValue').value=r.toPrecision(10).replace(/\.?0+$/,'')}
function swapUnits(){const f=document.getElementById('fromUnit'),to=document.getElementById('toUnit'),t=f.value;f.value=to.value;to.value=t;convert()}
populateUnits();convert();
</script>
</body>
</html>
