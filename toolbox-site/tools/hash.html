<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哈希计算 - MD5/SHA在线计算 | ToolBox</title>
<meta name="description" content="免费在线哈希计算工具，支持MD5、SHA1、SHA256、SHA512在线计算。">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="header"><div class="container"><a href="../index.html" class="logo">🧰 ToolBox</a><nav class="nav"><a href="../index.html">返回首页</a></nav></div></header>
<main class="tool-page"><div class="container">
<div class="breadcrumb"><a href="../index.html">首页</a> / 开发工具 / 哈希计算</div>
<h1># 哈希计算</h1>
<p class="subtitle">在线计算MD5、SHA1、SHA256、SHA512</p>
<div class="tool-area">
<h3>📝 输入文本</h3>
<textarea id="input" placeholder="输入要计算哈希的文本..." oninput="calcHash()"></textarea>
<div class="btn-group"><button class="btn btn-secondary" onclick="clearAll()">🗑️ 清空</button></div>
</div>
<div class="tool-area"><h3>📤 哈希结果</h3><div id="results" style="color:var(--text-light)">请输入文本</div></div>
<div class="tip"><strong>💡 关于哈希：</strong> 哈希是将任意长度的数据映射为固定长度字符串的函数，常用于数据完整性校验、密码存储等。</div>
</div></main>
<footer class="footer"><div class="container">© 2026 ToolBox</div></footer>
<script src="../js/main.js"></script>
<script>
async function calcHash(){const text=document.getElementById('input').value;if(!text){document.getElementById('results').innerHTML='<span style="color:var(--text-light)">请输入文本</span>';return}const data=new TextEncoder().encode(text);let html='';const algos=['SHA-1','SHA-256','SHA-512'];for(const a of algos){const buf=await crypto.subtle.digest(a,data);const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');html+='<div style="margin-bottom:12px"><label style="font-weight:bold;color:var(--primary)">'+a+'</label><div style="display:flex;gap:8px;align-items:center"><input type="text" value="'+hash+'" readonly style="font-family:Consolas,monospace;font-size:0.85em;background:#f8fafc"><button class="btn btn-secondary" style="padding:8px 12px" onclick="copyToClipboard(\''+hash+'\')">📋</button></div></div>'}document.getElementById('results').innerHTML=html}
function clearAll(){document.getElementById('input').value='';document.getElementById('results').innerHTML=''}
</script>
</body>
</html>
