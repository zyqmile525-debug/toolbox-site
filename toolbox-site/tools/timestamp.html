<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时间戳转换 - Unix时间戳在线转换 | ToolBox</title>
<meta name="description" content="免费在线时间戳转换工具，Unix时间戳与日期互转，支持多时区。">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="header"><div class="container"><a href="../index.html" class="logo">🧰 ToolBox</a><nav class="nav"><a href="../index.html">返回首页</a></nav></div></header>
<main class="tool-page"><div class="container">
<div class="breadcrumb"><a href="../index.html">首页</a> / 开发工具 / 时间戳转换</div>
<h1>⏰ 时间戳转换</h1>
<p class="subtitle">Unix时间戳与日期互转，实时显示当前时间戳</p>
<div class="tool-area">
<h3>📌 当前时间</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
<div style="background:#f1f5f9;padding:16px;border-radius:12px;text-align:center"><div style="font-size:0.85em;color:var(--text-light);margin-bottom:4px">秒级时间戳</div><div style="font-family:Consolas,monospace;font-size:1.6em;font-weight:bold;color:var(--primary)" id="nowSec">-</div></div>
<div style="background:#f1f5f9;padding:16px;border-radius:12px;text-align:center"><div style="font-size:0.85em;color:var(--text-light);margin-bottom:4px">毫秒级时间戳</div><div style="font-family:Consolas,monospace;font-size:1.6em;font-weight:bold;color:var(--primary)" id="nowMs">-</div></div>
</div>
<div style="text-align:center;margin-top:12px;font-size:1.1em" id="nowDate">-</div>
</div>
<div class="tool-area">
<h3>📅 时间戳 → 日期</h3>
<div class="grid-2">
<div><label>输入时间戳</label><input type="text" id="tsInput" placeholder="例如: 1700000000" oninput="tsToDate()"></div>
<div><label>单位</label><select id="tsUnit" onchange="tsToDate()"><option value="s">秒</option><option value="ms">毫秒</option></select></div>
</div>
<div id="tsResult" class="result-area" style="margin-top:16px;min-height:auto"></div>
</div>
<div class="tool-area">
<h3>日期 → 时间戳</h3>
<div class="grid-2">
<div><label>日期时间</label><input type="datetime-local" id="dateInput" onchange="dateToTs()"></div>
<div><label>&nbsp;</label><button class="btn btn-primary" onclick="setNow()" style="width:100%">📌 使用当前时间</button></div>
</div>
<div id="dateResult" class="result-area" style="margin-top:16px;min-height:auto"></div>
</div>
</div></main>
<footer class="footer"><div class="container">© 2026 ToolBox</div></footer>
<script src="../js/main.js"></script>
<script>
function updateNow(){const n=new Date();document.getElementById('nowSec').textContent=Math.floor(n.getTime()/1000);document.getElementById('nowMs').textContent=n.getTime();document.getElementById('nowDate').textContent=formatDate(n)}
function formatDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')}
function tsToDate(){const v=document.getElementById('tsInput').value.trim();if(!v){document.getElementById('tsResult').textContent='';return}let ts=parseInt(v);if(isNaN(ts)){document.getElementById('tsResult').textContent='❌ 请输入有效数字';return}if(document.getElementById('tsUnit').value==='s')ts*=1000;const d=new Date(ts);document.getElementById('tsResult').textContent='本地时间: '+formatDate(d)+'\nUTC: '+d.toUTCString()+'\nISO: '+d.toISOString()}
function dateToTs(){const v=document.getElementById('dateInput').value;if(!v){document.getElementById('dateResult').textContent='';return}const d=new Date(v);document.getElementById('dateResult').textContent='秒级: '+Math.floor(d.getTime()/1000)+'\n毫秒级: '+d.getTime()}
function setNow(){const n=new Date(),l=new Date(n.getTime()-n.getTimezoneOffset()*60000);document.getElementById('dateInput').value=l.toISOString().slice(0,16);dateToTs()}
updateNow();setInterval(updateNow,1000);setNow();
</script>
</body>
</html>
