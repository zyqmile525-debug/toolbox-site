<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64编解码 - 在线Base64编码解码工具 | ToolBox</title>
<meta name="description" content="免费在线Base64编码解码工具，支持文本和文件的Base64转换，支持中文。">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="header"><div class="container"><a href="../index.html" class="logo">🧰 ToolBox</a><nav class="nav"><a href="../index.html">返回首页</a></nav></div></header>
<main class="tool-page"><div class="container">
<div class="breadcrumb"><a href="../index.html">首页</a> / 开发工具 / Base64编解码</div>
<h1>🔐 Base64编解码</h1>
<p class="subtitle">在线Base64编码/解码，支持文本和文件，支持中文</p>
<div class="tool-area">
<h3>📝 输入文本</h3>
<textarea id="input" placeholder="输入要编码或解码的文本..."></textarea>
<div class="btn-group">
<button class="btn btn-primary" onclick="encode()">🔒 编码</button>
<button class="btn btn-primary" onclick="decode()">🔓 解码</button>
<button class="btn btn-secondary" onclick="clearAll()">🗑️ 清空</button>
</div></div>
<div class="tool-area">
<h3>📤 输出结果 <button class="btn btn-success" style="margin-left:auto;padding:6px 16px;font-size:0.85em" onclick="copyToClipboard(output.value)">📋 复制</button></h3>
<textarea id="output" placeholder="结果将显示在这里..." style="min-height:150px;background:#f8fafc"></textarea>
</div>
<div class="tip"><strong>💡 关于Base64：</strong> Base64是一种用64个ASCII字符来表示二进制数据的编码方式，常用于邮件附件、数据URL等场景。</div>
</div></main>
<footer class="footer"><div class="container">© 2026 ToolBox</div></footer>
<script src="../js/main.js"></script>
<script>
function encode(){try{output.value=btoa(unescape(encodeURIComponent(input.value)));showToast('编码成功')}catch(e){output.value='❌ 错误: '+e.message}}
function decode(){try{output.value=decodeURIComponent(escape(atob(input.value.trim())));showToast('解码成功')}catch(e){output.value='❌ 错误: 请输入有效的Base64字符串'}}
function clearAll(){input.value='';output.value=''}
</script>
</body>
</html>
