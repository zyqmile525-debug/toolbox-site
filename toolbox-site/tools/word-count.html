<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字数统计 - 在线中英文字数统计 | ToolBox</title>
<meta name="description" content="免费在线字数统计工具，支持中英文字符数、字数、行数、段落数统计。">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="header"><div class="container"><a href="../index.html" class="logo">🧰 ToolBox</a><nav class="nav"><a href="../index.html">返回首页</a></nav></div></header>
<main class="tool-page"><div class="container">
<div class="breadcrumb"><a href="../index.html">首页</a> / 文字工具 / 字数统计</div>
<h1>📊 字数统计</h1>
<p class="subtitle">实时统计中英文字符数、字数、行数、段落数</p>
<div class="tool-area">
<h3>📝 输入文本</h3>
<textarea id="input" placeholder="在这里输入或粘贴文本，下方会实时显示统计结果..." oninput="count()" style="min-height:200px"></textarea>
</div>
<div class="tool-area">
<h3>📊 统计结果</h3>
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px">
<div style="background:#ede9fe;padding:20px;border-radius:12px;text-align:center"><div style="font-size:2em;font-weight:800;color:#6366f1" id="totalChars">0</div><div style="font-size:0.85em;color:#64748b">总字符数</div></div>
<div style="background:#fef3c7;padding:20px;border-radius:12px;text-align:center"><div style="font-size:2em;font-weight:800;color:#d97706" id="chineseChars">0</div><div style="font-size:0.85em;color:#64748b">中文字符</div></div>
<div style="background:#d1fae5;padding:20px;border-radius:12px;text-align:center"><div style="font-size:2em;font-weight:800;color:#059669" id="englishChars">0</div><div style="font-size:0.85em;color:#64748b">英文字母</div></div>
<div style="background:#fee2e2;padding:20px;border-radius:12px;text-align:center"><div style="font-size:2em;font-weight:800;color:#dc2626" id="lines">0</div><div style="font-size:0.85em;color:#64748b">行数</div></div>
<div style="background:#e0f2fe;padding:20px;border-radius:12px;text-align:center"><div style="font-size:2em;font-weight:800;color:#0284c7" id="words">0</div><div style="font-size:0.85em;color:#64748b">英文单词</div></div>
<div style="background:#f5f3ff;padding:20px;border-radius:12px;text-align:center"><div style="font-size:2em;font-weight:800;color:#7c3aed" id="readTime">0</div><div style="font-size:0.85em;color:#64748b">阅读时间(分钟)</div></div>
</div></div>
</div></main>
<footer class="footer"><div class="container">© 2026 ToolBox</div></footer>
<script src="../js/main.js"></script>
<script>
function count(){const t=document.getElementById('input').value;document.getElementById('totalChars').textContent=t.length;document.getElementById('chineseChars').textContent=(t.match(/[一-鿿]/g)||[]).length;document.getElementById('englishChars').textContent=(t.match(/[a-zA-Z]/g)||[]).length;document.getElementById('lines').textContent=t?t.split('\n').length:0;document.getElementById('words').textContent=t?(t.match(/[a-zA-Z]+/g)||[]).length:0;document.getElementById('readTime').textContent=Math.ceil(((t.match(/[一-鿿]/g)||[]).length+(t.match(/[a-zA-Z]+/g)||[]).length)/500)||0}
</script>
</body>
</html>
