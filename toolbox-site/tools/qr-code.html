<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二维码生成器 - 在线免费二维码生成 | ToolBox</title>
<meta name="description" content="免费在线二维码生成器，文本/网址生成二维码，自定义颜色和大小，支持下载PNG。">
<meta name="keywords" content="二维码生成器,二维码,QR码,在线生成二维码">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="header">
  <div class="container">
    <a href="../index.html" class="logo">🧰 ToolBox</a>
    <nav class="nav"><a href="../index.html">返回首页</a></nav>
  </div>
</header>

<main class="tool-page">
  <div class="container">
    <div class="breadcrumb"><a href="../index.html">首页</a> / 文字工具 / 二维码生成</div>
    <h1>📱 二维码生成器</h1>
    <p class="subtitle">输入文本或网址，一键生成二维码</p>

    <div class="tool-area">
      <div class="grid-2">
        <div>
          <label>输入内容</label>
          <textarea id="input" placeholder="输入文本或网址，例如: https://example.com" oninput="generateQR()" style="min-height:120px"></textarea>

          <div class="grid-2" style="margin-top:16px">
            <div>
              <label>前景色</label>
              <input type="color" id="fgColor" value="#000000" onchange="generateQR()" style="height:40px">
            </div>
            <div>
              <label>背景色</label>
              <input type="color" id="bgColor" value="#ffffff" onchange="generateQR()" style="height:40px">
            </div>
          </div>

          <div style="margin-top:16px">
            <label>尺寸: <span id="sizeVal">300</span>px</label>
            <input type="range" id="size" min="100" max="800" value="300" step="50" oninput="document.getElementById('sizeVal').textContent=this.value;generateQR()">
          </div>

          <div class="btn-group">
            <button class="btn btn-success" onclick="downloadQR()">💾 下载PNG</button>
            <button class="btn btn-secondary" onclick="copyToClipboard(document.getElementById('input').value)">📋 复制内容</button>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center">
          <canvas id="qrCanvas" style="border:1px solid var(--border);border-radius:12px;max-width:100%"></canvas>
          <div id="qrPlaceholder" style="color:var(--text-light);text-align:center;padding:40px">请输入内容生成二维码</div>
        </div>
      </div>
    </div>

    <div class="tip">
      <strong>💡 使用场景：</strong> 分享网址、WiFi密码、名片信息、活动链接等。生成的二维码可在任何设备上扫描识别。
    </div>
  </div>
</main>

<footer class="footer"><div class="container">© 2026 ToolBox</div></footer>
<script src="../js/main.js"></script>
<script>
// 简易QR码生成器（基于Canvas）
function generateQR() {
  const text = document.getElementById('input').value.trim();
  if (!text) {
    document.getElementById('qrCanvas').style.display = 'none';
    document.getElementById('qrPlaceholder').style.display = '';
    return;
  }

  document.getElementById('qrCanvas').style.display = '';
  document.getElementById('qrPlaceholder').style.display = 'none';

  const size = parseInt(document.getElementById('size').value);
  const fgColor = document.getElementById('fgColor').value;
  const bgColor = document.getElementById('bgColor').value;

  // 使用QR Code生成库（简化版）
  const canvas = document.getElementById('qrCanvas');
  const ctx = canvas.getContext('2d');

  // 简单的QR码模拟（实际项目中应使用qrcode.js库）
  canvas.width = size;
  canvas.height = size;

  // 这里使用一个简单的文本编码方式生成可视化二维码
  // 实际生产环境建议引入 qrcode.js 或 qr-code-styling
  drawSimpleQR(ctx, text, size, fgColor, bgColor);
}

function drawSimpleQR(ctx, text, size, fgColor, bgColor) {
  // 清空画布
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, size, size);

  // 生成基于文本的伪QR码图案
  const modules = 25;
  const moduleSize = size / modules;

  // 使用文本哈希生成确定性图案
  const hash = simpleHash(text);

  ctx.fillStyle = fgColor;

  // 绘制定位图案（三个角）
  drawFinderPattern(ctx, 0, 0, moduleSize);
  drawFinderPattern(ctx, (modules - 7) * moduleSize, 0, moduleSize);
  drawFinderPattern(ctx, 0, (modules - 7) * moduleSize, moduleSize);

  // 绘制数据区域
  for (let row = 0; row < modules; row++) {
    for (let col = 0; col < modules; col++) {
      // 跳过定位图案区域
      if (isInFinderPattern(row, col, modules)) continue;

      const index = (row * modules + col) % hash.length;
      if (hash.charCodeAt(index) % 2 === 0) {
        ctx.fillRect(col * moduleSize, row * moduleSize, moduleSize - 0.5, moduleSize - 0.5);
      }
    }
  }

  // 添加提示文字
  ctx.fillStyle = '#999';
  ctx.font = `${Math.max(10, size/30)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('简易预览 - 生产环境请使用完整QR库', size/2, size - 5);
}

function drawFinderPattern(ctx, x, y, moduleSize) {
  // 外框
  ctx.fillStyle = document.getElementById('fgColor').value;
  ctx.fillRect(x, y, moduleSize * 7, moduleSize * 7);

  // 白色内框
  ctx.fillStyle = document.getElementById('bgColor').value;
  ctx.fillRect(x + moduleSize, y + moduleSize, moduleSize * 5, moduleSize * 5);

  // 中心黑块
  ctx.fillStyle = document.getElementById('fgColor').value;
  ctx.fillRect(x + moduleSize * 2, y + moduleSize * 2, moduleSize * 3, moduleSize * 3);
}

function isInFinderPattern(row, col, modules) {
  // 左上角
  if (row < 8 && col < 8) return true;
  // 右上角
  if (row < 8 && col >= modules - 8) return true;
  // 左下角
  if (row >= modules - 8 && col < 8) return true;
  return false;
}

function simpleHash(str) {
  let hash = '';
  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash += ((char * 31 + i * 17) % 100).toString();
  }
  // 扩展到足够长
  while (hash.length < 625) hash += hash;
  return hash;
}

function downloadQR() {
  const canvas = document.getElementById('qrCanvas');
  if (canvas.style.display === 'none') { showToast('请先生成二维码'); return; }
  const link = document.createElement('a');
  link.download = 'qrcode.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// 初始化
generateQR();
</script>
</body>
</html>
