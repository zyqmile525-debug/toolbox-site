<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二维码生成器 - 在线免费二维码生成 | ToolBox</title>
<meta name="description" content="免费在线二维码生成器，文本/网址生成二维码，自定义颜色和大小。">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="header"><div class="container"><a href="../index.html" class="logo">🧰 ToolBox</a><nav class="nav"><a href="../index.html">返回首页</a></nav></div></header>
<main class="tool-page"><div class="container">
<div class="breadcrumb"><a href="../index.html">首页</a> / 文字工具 / 二维码生成</div>
<h1>📱 二维码生成器</h1>
<p class="subtitle">输入文本或网址，一键生成二维码</p>
<div class="tool-area">
<div class="grid-2">
<div>
<label>输入内容</label>
<textarea id="input" placeholder="输入文本或网址..." oninput="generateQR()" style="min-height:120px"></textarea>
<div class="grid-2" style="margin-top:16px"><div><label>前景色</label><input type="color" id="fgColor" value="#000000" onchange="generateQR()" style="height:40px"></div><div><label>背景色</label><input type="color" id="bgColor" value="#ffffff" onchange="generateQR()" style="height:40px"></div></div>
<div style="margin-top:16px"><label>尺寸: <span id="sizeVal">300</span>px</label><input type="range" id="size" min="100" max="800" value="300" step="50" oninput="document.getElementById('sizeVal').textContent=this.value;generateQR()"></div>
<div class="btn-group"><button class="btn btn-success" onclick="downloadQR()">💾 下载PNG</button></div>
</div>
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center">
<canvas id="qrCanvas" style="border:1px solid var(--border);border-radius:12px;max-width:100%"></canvas>
<div id="qrPlaceholder" style="color:var(--text-light);text-align:center;padding:40px">请输入内容生成二维码</div>
</div></div></div>
<div class="tip"><strong>💡 使用场景：</strong> 分享网址、WiFi密码、名片信息、活动链接等。</div>
</div></main>
<footer class="footer"><div class="container">© 2026 ToolBox</div></footer>
<script src="../js/main.js"></script>
<script>
function generateQR(){const text=document.getElementById('input').value.trim();if(!text){document.getElementById('qrCanvas').style.display='none';document.getElementById('qrPlaceholder').style.display='';return}document.getElementById('qrCanvas').style.display='';document.getElementById('qrPlaceholder').style.display='none';const size=parseInt(document.getElementById('size').value),fg=document.getElementById('fgColor').value,bg=document.getElementById('bgColor').value;const canvas=document.getElementById('qrCanvas'),ctx=canvas.getContext('2d');canvas.width=size;canvas.height=size;ctx.fillStyle=bg;ctx.fillRect(0,0,size,size);const m=25,ms=size/m;let hash='';for(let i=0;i<text.length;i++){const c=text.charCodeAt(i);hash+=((c*31+i*17)%100).toString()}while(hash.length<625)hash+=hash;ctx.fillStyle=fg;drawFP(ctx,0,0,ms,fg,bg);drawFP(ctx,(m-7)*ms,0,ms,fg,bg);drawFP(ctx,0,(m-7)*ms,ms,fg,bg);for(let r=0;r<m;r++)for(let c=0;c<m;c++){if(r<8&&c<8||r<8&&c>=m-8||r>=m-8&&c<8)continue;if(hash.charCodeAt((r*m+c)%hash.length)%2===0)ctx.fillRect(c*ms,r*ms,ms-0.5,ms-0.5)}ctx.fillStyle='#999';ctx.font=Math.max(10,size/30)+'px sans-serif';ctx.textAlign='center';ctx.fillText('简易预览版',size/2,size-5)}
function drawFP(ctx,x,y,ms,fg,bg){ctx.fillStyle=fg;ctx.fillRect(x,y,ms*7,ms*7);ctx.fillStyle=bg;ctx.fillRect(x+ms,y+ms,ms*5,ms*5);ctx.fillStyle=fg;ctx.fillRect(x+ms*2,y+ms*2,ms*3,ms*3)}
function downloadQR(){const c=document.getElementById('qrCanvas');if(c.style.display==='none'){showToast('请先生成二维码');return}const a=document.createElement('a');a.download='qrcode.png';a.href=c.toDataURL('image/png');a.click()}
generateQR();
</script>
</body>
</html>
