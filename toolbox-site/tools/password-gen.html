<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密码生成器 - 在线随机安全密码生成 | ToolBox</title>
<meta name="description" content="免费在线密码生成器，自定义长度和规则，生成安全随机密码。">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="header"><div class="container"><a href="../index.html" class="logo">🧰 ToolBox</a><nav class="nav"><a href="../index.html">返回首页</a></nav></div></header>
<main class="tool-page"><div class="container">
<div class="breadcrumb"><a href="../index.html">首页</a> / 生活工具 / 密码生成</div>
<h1>🔑 密码生成器</h1>
<p class="subtitle">生成安全随机密码，自定义长度和字符类型</p>
<div class="tool-area">
<div style="background:#f1f5f9;border-radius:12px;padding:20px;text-align:center;margin-bottom:20px">
<div id="pwd" style="font-family:Consolas,monospace;font-size:1.8em;font-weight:bold;word-break:break-all;letter-spacing:2px;min-height:50px;display:flex;align-items:center;justify-content:center"></div>
</div>
<div style="margin-bottom:20px"><label>密码长度: <span id="lenVal">16</span></label>
<input type="range" id="length" min="4" max="64" value="16" oninput="document.getElementById('lenVal').textContent=this.value;generate()">
<div class="range-labels"><span>4位</span><span>64位</span></div></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
<label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="upper" checked onchange="generate()"> 大写字母 (A-Z)</label>
<label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="lower" checked onchange="generate()"> 小写字母 (a-z)</label>
<label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="digits" checked onchange="generate()"> 数字 (0-9)</label>
<label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="symbols" checked onchange="generate()"> 特殊符号 (!@#$)</label>
</div>
<div class="btn-group" style="justify-content:center">
<button class="btn btn-primary" onclick="generate()" style="padding:14px 40px;font-size:1.1em">🔄 生成密码</button>
<button class="btn btn-success" onclick="copyToClipboard(document.getElementById('pwd').textContent)" style="padding:14px 40px;font-size:1.1em">📋 复制</button>
</div></div>
<div class="tool-area">
<h3>📊 密码强度</h3>
<div style="height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin-bottom:8px"><div id="strengthFill" style="height:100%;border-radius:4px;transition:all 0.3s"></div></div>
<div id="strengthText" style="font-size:0.9em;color:var(--text-light)"></div>
</div>
<div class="tip"><strong>💡 安全建议：</strong> 使用12位以上密码，包含大小写字母、数字和特殊符号。不同网站使用不同密码。</div>
</div></main>
<footer class="footer"><div class="container">© 2026 ToolBox</div></footer>
<script src="../js/main.js"></script>
<script>
function generate(){const len=parseInt(document.getElementById('length').value);let chars='';if(document.getElementById('upper').checked)chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';if(document.getElementById('lower').checked)chars+='abcdefghijklmnopqrstuvwxyz';if(document.getElementById('digits').checked)chars+='0123456789';if(document.getElementById('symbols').checked)chars+='!@#$%^&*()_+-=[]{}|;:,.<>?';if(!chars){showToast('请至少选择一种字符类型');return}let pwd='';const a=new Uint32Array(len);crypto.getRandomValues(a);for(let i=0;i<len;i++)pwd+=chars[a[i]%chars.length];document.getElementById('pwd').textContent=pwd;let score=0;if(len>=8)score++;if(len>=12)score++;if(len>=16)score++;if(/[a-z]/.test(pwd))score++;if(/[A-Z]/.test(pwd))score++;if(/[0-9]/.test(pwd))score++;if(/[^a-zA-Z0-9]/.test(pwd))score++;const pct=score/7*100,fill=document.getElementById('strengthFill');fill.style.width=pct+'%';let label,color;if(pct<30){label='弱';color='#ef4444'}else if(pct<50){label='一般';color='#f59e0b'}else if(pct<70){label='强';color='#10b981'}else{label='非常强';color='#059669'}fill.style.background=color;document.getElementById('strengthText').innerHTML='强度: <span style="color:'+color+';font-weight:bold">'+label+'</span>'}
generate();
</script>
</body>
</html>
