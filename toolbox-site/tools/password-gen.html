<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密码生成器 - 在线随机安全密码生成 | ToolBox</title>
<meta name="description" content="免费在线密码生成器，自定义长度和规则，生成安全随机密码。">
<meta name="keywords" content="密码生成器,随机密码,安全密码,密码生成,在线工具">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="header">
  <div class="container">
    <a href="../index.html" class="logo">🧰 ToolBox</a>
    <nav class="nav"><a href="../index.html">返回首页</a></nav>
  </div>
</header>

<main class="tool-page">
  <div class="container">
    <div class="breadcrumb"><a href="../index.html">首页</a> / 生活工具 / 密码生成</div>
    <h1>🔑 密码生成器</h1>
    <p class="subtitle">生成安全随机密码，自定义长度和字符类型</p>

    <div class="tool-area">
      <div style="background:#f1f5f9;border-radius:12px;padding:20px;text-align:center;margin-bottom:20px">
        <div id="passwordDisplay" style="font-family:Consolas,monospace;font-size:1.8em;font-weight:bold;word-break:break-all;letter-spacing:2px;min-height:50px;display:flex;align-items:center;justify-content:center"></div>
      </div>

      <div style="margin-bottom:20px">
        <label>密码长度: <span id="lenVal">16</span></label>
        <input type="range" id="length" min="4" max="64" value="16" oninput="document.getElementById('lenVal').textContent=this.value;generate()">
        <div class="range-labels"><span>4位</span><span>64位</span></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="upper" checked onchange="generate()"> 大写字母 (A-Z)
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="lower" checked onchange="generate()"> 小写字母 (a-z)
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="digits" checked onchange="generate()"> 数字 (0-9)
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="symbols" checked onchange="generate()"> 特殊符号 (!@#$)
        </label>
      </div>

      <div class="btn-group" style="justify-content:center">
        <button class="btn btn-primary" onclick="generate()" style="padding:14px 40px;font-size:1.1em">🔄 生成密码</button>
        <button class="btn btn-success" onclick="copyPwd()" style="padding:14px 40px;font-size:1.1em">📋 复制</button>
      </div>
    </div>

    <div class="tool-area">
      <h3>📊 密码强度分析</h3>
      <div id="strengthBar" style="height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin-bottom:8px">
        <div id="strengthFill" style="height:100%;border-radius:4px;transition:all 0.3s"></div>
      </div>
      <div id="strengthText" style="font-size:0.9em;color:var(--text-light)"></div>
      <div id="strengthDetail" style="margin-top:12px;font-size:0.85em;color:var(--text-light)"></div>
    </div>

    <div class="tool-area">
      <h3>📜 生成历史</h3>
      <div id="history" style="max-height:200px;overflow-y:auto"></div>
    </div>

    <div class="tip">
      <strong>💡 安全建议：</strong> 使用12位以上密码，包含大小写字母、数字和特殊符号。不同网站使用不同密码，定期更换重要账户密码。
    </div>
  </div>
</main>

<footer class="footer"><div class="container">© 2026 ToolBox</div></footer>
<script src="../js/main.js"></script>
<script>
let history = [];

function generate() {
  const length = parseInt(document.getElementById('length').value);
  let chars = '';
  if (document.getElementById('upper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if (document.getElementById('lower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
  if (document.getElementById('digits').checked) chars += '0123456789';
  if (document.getElementById('symbols').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

  if (!chars) { showToast('请至少选择一种字符类型'); return; }

  let password = '';
  const array = new Uint32Array(length);
  crypto.getRandomValues(array);
  for (let i = 0; i < length; i++) {
    password += chars[array[i] % chars.length];
  }

  document.getElementById('passwordDisplay').textContent = password;
  analyzeStrength(password);
  addToHistory(password);
}

function analyzeStrength(pwd) {
  let score = 0;
  const checks = [];

  if (pwd.length >= 8) { score += 1; checks.push('✅ 8位以上'); } else { checks.push('❌ 不足8位'); }
  if (pwd.length >= 12) { score += 1; checks.push('✅ 12位以上'); }
  if (pwd.length >= 16) { score += 1; checks.push('✅ 16位以上'); }
  if (/[a-z]/.test(pwd)) { score += 1; checks.push('✅ 包含小写字母'); } else { checks.push('❌ 无小写字母'); }
  if (/[A-Z]/.test(pwd)) { score += 1; checks.push('✅ 包含大写字母'); } else { checks.push('❌ 无大写字母'); }
  if (/[0-9]/.test(pwd)) { score += 1; checks.push('✅ 包含数字'); } else { checks.push('❌ 无数字'); }
  if (/[^a-zA-Z0-9]/.test(pwd)) { score += 1; checks.push('✅ 包含特殊符号'); } else { checks.push('❌ 无特殊符号'); }

  const maxScore = 7;
  const percent = (score / maxScore) * 100;
  const fill = document.getElementById('strengthFill');
  fill.style.width = percent + '%';

  let label, color;
  if (percent < 30) { label = '弱'; color = '#ef4444'; }
  else if (percent < 50) { label = '一般'; color = '#f59e0b'; }
  else if (percent < 70) { label = '强'; color = '#10b981'; }
  else { label = '非常强'; color = '#059669'; }

  fill.style.background = color;
  document.getElementById('strengthText').innerHTML = `强度: <span style="color:${color};font-weight:bold">${label}</span> (${score}/${maxScore})`;
  document.getElementById('strengthDetail').innerHTML = checks.join('<br>');
}

function addToHistory(pwd) {
  history.unshift(pwd);
  if (history.length > 20) history.pop();
  document.getElementById('history').innerHTML = history.map((p, i) =>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid var(--border);font-family:Consolas,monospace;font-size:0.9em">
      <span style="word-break:break-all">${p}</span>
      <button class="btn btn-secondary" style="padding:4px 10px;font-size:0.8em;white-space:nowrap" onclick="copyToClipboard('${p}')">复制</button>
    </div>`
  ).join('');
}

function copyPwd() {
  const pwd = document.getElementById('passwordDisplay').textContent;
  if (pwd) copyToClipboard(pwd);
  else showToast('请先生成密码');
}

generate();
</script>
</body>
</html>
